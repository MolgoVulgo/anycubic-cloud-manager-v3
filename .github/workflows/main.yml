name: Source release on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create source archive release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest reachable version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"
          if [[ -z "${tag}" ]]; then
            echo "No reachable v* tag found; skipping release."
            echo "tag=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create source archive release
        if: steps.version.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists; skipping."
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            --verify-tag
